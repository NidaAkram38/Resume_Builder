<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#0d0f14" />
  <title>Dashboard — Lynxperio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0f14; --paper: #faf9f6; --cream: #f2efe8;
      --accent: #c8521a; --accent-light: #f0e8e0;
      --muted: #7a7670; --border: #e4e0d8;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav {
      background: var(--ink); padding: 14px 6%;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: white; text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: rgba(255,255,255,0.55); }
    .nav-logout {
      background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .nav-logout:hover { background: rgba(255,255,255,0.18); }

    /* PAGE */
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 6%; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .btn-primary {
      background: var(--accent); color: white; padding: 11px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 700; border: none; cursor: pointer;
      transition: background 0.2s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { background: #b84616; }

    /* QUICK ACTIONS */
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
    .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 40px; }

    .action-card {
      background: var(--paper); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px 20px; cursor: pointer; text-decoration: none; color: var(--ink);
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .action-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.07); transform: translateY(-3px); border-color: var(--accent); }
    .action-icon { font-size: 22px; }
    .action-card h3 { font-size: 14px; font-weight: 700; }
    .action-card p { font-size: 12px; color: var(--muted); line-height: 1.4; }

    /* RESUMES GRID */
    .resumes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

    .resume-card {
      background: var(--paper); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: box-shadow 0.2s, transform 0.2s;
    }
    .resume-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.07); transform: translateY(-2px); }

    .resume-thumb {
      height: 140px; background: linear-gradient(135deg, var(--ink) 0%, #2a2d36 100%);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .resume-thumb-inner { background: white; width: 75px; height: 96px; border-radius: 4px; padding: 8px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .rt-line { height: 4px; background: var(--border); border-radius: 2px; }
    .rt-line.dark { background: var(--ink); }
    .rt-line.accent { background: var(--accent); }
    .rt-line.f { width: 100%; } .rt-line.e { width: 80%; } .rt-line.s { width: 55%; }

    .resume-info { padding: 16px 18px; }
    .resume-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .resume-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .resume-actions { display: flex; gap: 8px; }
    .res-btn {
      flex: 1; padding: 8px 6px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
      background: transparent; color: var(--ink); font-family: 'DM Sans', sans-serif; text-align: center;
    }
    .res-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .res-btn.danger:hover { background: #dc2626; border-color: #dc2626; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; background: var(--paper); border: 2px dashed var(--border); border-radius: 16px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* Loading spinner */
    .loading { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      nav { padding: 12px 5%; }
      .nav-user { display: none; }
      .page { padding: 28px 5% 48px; }
      .page-header h1 { font-size: 26px; }
      .page-header { margin-bottom: 24px; }
      .btn-primary { width: 100%; text-align: center; padding: 12px; }
      .quick-actions { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
      .action-card { padding: 16px 14px; }
      .action-icon { font-size: 18px; }
      .action-card h3 { font-size: 13px; }
      .action-card p { font-size: 11px; }
      .resumes-grid { grid-template-columns: 1fr; }
      .resume-thumb { height: 120px; }
    }

    @media (max-width: 420px) {
      .quick-actions { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Lynx<span>perio</span></a>
  <div class="nav-right">
    <span class="nav-user" id="navUser">Loading…</span>
    <a href="../backend/logout.php" class="nav-logout">Sign Out</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div>
      <h1>My Resumes</h1>
      <p>Build, edit, and download your resumes</p>
    </div>
    <a href="builder.html" class="btn-primary">+ New Resume</a>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="section-title">Quick Actions</div>
  <div class="quick-actions">
    <a href="builder.html" class="action-card">
      <div class="action-icon">✏️</div>
      <h3>New Resume</h3>
      <p>Start building with a fresh template</p>
    </a>
    <a href="templates.html" class="action-card">
      <div class="action-icon">🎨</div>
      <h3>Browse Templates</h3>
      <p>Pick a style that fits your career</p>
    </a>
    <a href="builder.html" class="action-card">
      <div class="action-icon">⬇️</div>
      <h3>Download PDF</h3>
      <p>Export your latest resume as PDF</p>
    </a>
  </div>

  <!-- RESUMES -->
  <div class="section-title">Saved Resumes</div>
  <div id="resumesContainer">
    <div class="loading"><div class="spinner"></div></div>
  </div>

</div>

<script>
  // Load user info
  fetch('../backend/get_resumes.php')
    .then(r => r.json())
    .then(data => {
      if (data.user) {
        document.getElementById('navUser').textContent = '👤 ' + data.user.name;
      }
      renderResumes(data.resumes || []);
    })
    .catch(() => {
      // Not logged in or backend unavailable — show empty state
      document.getElementById('navUser').textContent = 'Guest';
      renderResumes([]);
    });

  function renderResumes(resumes) {
    const container = document.getElementById('resumesContainer');
    if (!resumes.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📄</div>
          <h3>No resumes yet</h3>
          <p>Create your first resume to get started — it only takes a few minutes.</p>
          <a href="builder.html" class="btn-primary">Build My First Resume →</a>
        </div>`;
      return;
    }
    container.innerHTML = `<div class="resumes-grid">${resumes.map(r => resumeCard(r)).join('')}</div>`;
  }

  function resumeCard(r) {
    const date = new Date(r.updated_at || r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    return `
      <div class="resume-card">
        <div class="resume-thumb">
          <div class="resume-thumb-inner">
            <div class="rt-line dark f"></div><div class="rt-line dark e"></div>
            <div style="height:2px;background:#e4e0d8;margin:2px 0"></div>
            <div class="rt-line f"></div><div class="rt-line e"></div><div class="rt-line s"></div>
            <div class="rt-line f"></div><div class="rt-line e"></div>
          </div>
        </div>
        <div class="resume-info">
          <div class="resume-name">${escHtml(r.title || 'Untitled Resume')}</div>
          <div class="resume-meta">Updated ${date} · ${escHtml(r.template || 'Classic')}</div>
          <div class="resume-actions">
            <button class="res-btn" onclick="editResume(${r.id})">✏️ Edit</button>
            <button class="res-btn" onclick="downloadResume(${r.id})">⬇ PDF</button>
            <button class="res-btn danger" onclick="deleteResume(${r.id}, this)">🗑</button>
          </div>
        </div>
      </div>`;
  }

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function editResume(id) { window.location.href = `builder.html?id=${id}`; }

  function downloadResume(id) {
    window.open(`../backend/download_pdf.php?id=${id}`, '_blank');
  }

  function deleteResume(id, btn) {
    if (!confirm('Delete this resume? This cannot be undone.')) return;
    btn.textContent = '…'; btn.disabled = true;
    fetch('../backend/delete_resume.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        btn.closest('.resume-card').remove();
        // If no more cards, show empty state
        if (!document.querySelector('.resume-card')) {
          renderResumes([]);
        }
      } else {
        alert('Could not delete resume. Please try again.');
        btn.textContent = '🗑'; btn.disabled = false;
      }
    })
    .catch(() => {
      alert('Connection error.');
      btn.textContent = '🗑'; btn.disabled = false;
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Lynxperio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0f14; --paper: #faf9f6; --cream: #f2efe8;
      --accent: #c8521a; --accent-light: #f0e8e0;
      --muted: #7a7670; --border: #e4e0d8;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex;
      background: var(--ink);
      color: var(--ink);
    }

    /* Left panel */
    .left-panel {
      flex: 1;
      background: var(--ink);
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 64px 72px;
      position: relative; overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute; top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,82,26,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .left-panel::after {
      content: '';
      position: absolute; bottom: -60px; left: 40px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(200,82,26,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .left-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; color: var(--paper);
      text-decoration: none; margin-bottom: 64px;
      display: block;
    }
    .left-logo span { color: var(--accent); }

    .left-tagline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 3vw, 42px);
      color: var(--paper); line-height: 1.2;
      letter-spacing: -0.5px; margin-bottom: 16px;
    }
    .left-tagline em { color: var(--accent); font-style: italic; }
    .left-sub { font-size: 15px; color: rgba(250,249,246,0.5); line-height: 1.6; max-width: 380px; }

    .left-proof {
      margin-top: 48px;
      display: flex; align-items: center; gap: 14px;
    }
    .proof-dots { display: flex; gap: 4px; }
    .proof-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--ink);
    }
    .proof-dot:nth-child(1) { background: #a8d5b5; }
    .proof-dot:nth-child(2) { background: #f0c27f; margin-left: -10px; }
    .proof-dot:nth-child(3) { background: #b8a8d8; margin-left: -10px; }
    .proof-text { font-size: 13px; color: rgba(250,249,246,0.5); }
    .proof-text strong { color: rgba(250,249,246,0.85); }

    /* Right panel */
    .right-panel {
      width: 480px; flex-shrink: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      padding: 48px 56px;
    }

    .form-box { width: 100%; max-width: 360px; }

    .form-box h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 30px; letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .form-box .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
    .form-box .subtitle a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: white; color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,82,26,0.1);
    }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 16px; user-select: none; color: var(--muted);
    }

    .forgot { text-align: right; margin-top: -10px; margin-bottom: 20px; }
    .forgot a { font-size: 12px; color: var(--muted); text-decoration: none; }
    .forgot a:hover { color: var(--accent); }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 14px;
    }
    .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--muted); margin-bottom: 14px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-builder {
      width: 100%; padding: 13px;
      background: var(--cream);
      color: var(--ink); border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      text-align: center; text-decoration: none;
      display: block;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-builder:hover { border-color: var(--ink); background: var(--border); }

    .msg { font-size: 13px; color: #dc2626; margin-bottom: 12px; min-height: 20px; }

    /* Responsive */
    @media (max-width: 900px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

<!-- LEFT -->
<div class="left-panel">
  <a href="index.html" class="left-logo">Lynx<span>perio</span></a>
  <h2 class="left-tagline">Your resume,<br><em>perfected.</em></h2>
  <p class="left-sub">Save your work, access it anywhere, and build as many resumes as you need — all free.</p>
  <div class="left-proof">
    <div class="proof-dots">
      <div class="proof-dot"></div>
      <div class="proof-dot"></div>
      <div class="proof-dot"></div>
    </div>
    <div class="proof-text"><strong>Free forever</strong> · No hidden charges</div>
  </div>
</div>

<!-- RIGHT -->
<div class="right-panel">
  <div class="form-box">
    <h2>Welcome back</h2>
    <p class="subtitle">No account? <a href="register.html">Create one →</a></p>

    <p class="msg" id="msg"></p>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required>
          <span class="pw-toggle" onclick="togglePw('password', this)">👁</span>
        </div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>

    <div class="divider">or</div>
    <a href="builder.html" class="btn-builder">Continue without account</a>
  </div>
</div>

<script>
  function togglePw(id, el) {
    const f = document.getElementById(id);
    if (f.type === 'password') { f.type = 'text'; el.textContent = '🙈'; }
    else { f.type = 'password'; el.textContent = '👁'; }
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.textContent = '';
    const btn = this.querySelector('button[type=submit]');
    btn.textContent = 'Signing in...'; btn.disabled = true;

    try {
      const res = await fetch('../backend/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = 'dashboard.html';
      } else {
        msg.textContent = data.message || 'Invalid credentials.';
        btn.textContent = 'Sign In →'; btn.disabled = false;
      }
    } catch {
      msg.textContent = 'Connection error. Please try again.';
      btn.textContent = 'Sign In →'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
